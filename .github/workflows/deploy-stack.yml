name: deploy-stack

# Build the web image on every push to main that touches site source,
# push to GHCR, then SSH-deploy to the VPS (single-service stack behind
# the shared Caddy). workflow_dispatch is the bootstrap / hotfix path.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.ts"
      - "tailwind.config.ts"
      - "Dockerfile"
      - ".github/workflows/deploy-stack.yml"
  workflow_dispatch:

concurrency:
  group: deploy-stack
  cancel-in-progress: false

jobs:
  build-and-push-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/voxhorizon-website:latest
            ghcr.io/${{ github.repository_owner }}/voxhorizon-website:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  deploy:
    needs: [build-and-push-web]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            cd /opt/voxhorizon-website
            docker compose pull
            docker compose up -d --remove-orphans
            status=unhealthy
            for i in $(seq 1 12); do
              cid=$(docker compose ps -q web)
              status=$(docker inspect --format='{{.State.Health.Status}}' "$cid" 2>/dev/null || echo unhealthy)
              [ "$status" = "healthy" ] && break
              sleep 5
            done
            if [ "$status" != "healthy" ]; then
              echo "web unhealthy after rollout (status=$status)"
              docker compose logs --tail=200 web
              exit 1
            fi
            docker image prune -f
